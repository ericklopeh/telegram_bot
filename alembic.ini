[alembic]
script_location = migrations
prepend_sys_path = .
# Valor ignorado en runtime: migrations/env.py usa DATABASE_URL desde .env
sqlalchemy.url = postgresql+psycopg://bot_user:password@localhost:5433/bot_gaman

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
